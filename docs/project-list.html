<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  s=esc(s);
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return s;
}
function render(md){
  var lines=md.replace(/\r/g,'').replace(/^\n+/,'').split('\n');
  var out=[],list=null,item=null,bq=null;
  function pushItem(){ if(item){
    var h='<div class="li-head">'+inline(item.head)+'</div>';
    var m=item.subs.length?'<div class="li-meta">'+inline(item.subs[0])+'</div>':'';
    var d=item.subs.length>1?'<div class="li-desc">'+item.subs.slice(1).map(inline).join(' ')+'</div>':'';
    list.push('<li>'+h+m+d+'</li>'); item=null;
  }}
  function flushList(){ pushItem(); if(list){ out.push('<ul class="plist">'+list.join('')+'</ul>'); list=null; } }
  function flushBq(){ if(bq){ out.push('<blockquote>'+bq.map(inline).join(' ')+'</blockquote>'); bq=null; } }
  for(var i=0;i<lines.length;i++){
    var ln=lines[i],t=ln.trim();
    if(/^##\s+/.test(ln)){ flushList(); flushBq(); out.push('<h2>'+inline(t.replace(/^##\s+/,''))+'</h2>'); }
    else if(/^#\s+/.test(ln)){ flushList(); flushBq(); out.push('<h1>'+inline(t.replace(/^#\s+/,''))+'</h1>'); }
    else if(t==='---'){ flushList(); flushBq(); out.push('<hr>'); }
    else if(/^>\s?/.test(ln)){ flushList(); if(!bq)bq=[]; bq.push(t.replace(/^>\s?/,'')); }
    else if(/^-\s+/.test(ln)){ flushBq(); pushItem(); if(!list)list=[]; item={head:t.replace(/^-\s+/,''),subs:[]}; }
    else if(/^\s{2,}\S/.test(ln)&&item){ item.subs.push(t); }
    else if(t===''){ pushItem(); flushBq(); }
    else { flushList(); flushBq(); out.push('<p>'+inline(t)+'</p>'); }
  }
  flushList(); flushBq();
  return out.join('\n');
}
document.getElementById('content').innerHTML=render(document.getElementById('md').textContent);
</script>
